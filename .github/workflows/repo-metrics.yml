name: Generate Repo Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Repository Infographics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: NishantSaud
          repo: Nepali-Tool-Kit
          
          # Changes made here:
          output_action: commit
          committer_branch: metrics  # <--- The bot will create & push to this branch
          filename: github-metrics.svg

          template: repository
          base: header, metadata

          plugin_contributors: yes
          plugin_contributors_base: ""
          plugin_contributors_head: ""
          plugin_contributors_ignored: github-actions[bot], dependabot[bot]
          plugin_contributors_contributions: yes

          plugin_lines: yes

          plugin_followup: yes
          plugin_followup_sections: repositories